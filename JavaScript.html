<script>
let allMeeMeows = []; // We'll store the data here so we can filter it easily

google.script.run.withSuccessHandler(initializeStore).getMeeMeows();

function initializeStore(data) {
  allMeeMeows = data;
  populateDropdowns(data); // Renamed to handle both
  showCats(data);
}

function populateDropdowns(data) {
  const seriesDropdown = document.getElementById('seriesFilter');
  const formDropdown = document.getElementById('formFilter');
  
  // 1. Get unique Series
  const seriesList = [...new Set(data.slice(1).map(row => row[1]))].sort();
  
  // 2. Get unique individual Forms
  // We split by comma, trim whitespace, and flatten the array
  const allFormsRaw = data.slice(1).map(row => row[3] ? row[3].split(',') : []);
  const flatForms = allFormsRaw.flat().map(f => f.trim()).filter(f => f !== "");
  const uniqueForms = [...new Set(flatForms)].sort();

  // Populate Series
  seriesList.forEach(series => {
    if (series) {
      let opt = document.createElement('option');
      opt.value = series;
      opt.innerHTML = series;
      seriesDropdown.appendChild(opt);
    }
  });

  // Populate Forms
  uniqueForms.forEach(form => {
    let opt = document.createElement('option');
    opt.value = form;
    opt.innerHTML = form;
    formDropdown.appendChild(opt);
  });
}

function applyFilters() {
  const searchTerm = document.getElementById('searchInput').value.toLowerCase();
  const seriesValue = document.getElementById('seriesFilter').value;
  const formValue = document.getElementById('formFilter').value;

  const filteredData = allMeeMeows.filter((row, index) => {
    if (index === 0) return false; 
    
    // Clean quotes for comparison, just like we did for the buttons
    const name = row[0].toLowerCase();
    const catForms = row[3] ? row[3].split(',').map(f => f.trim()) : [];
    
    const matchesSearch = name.includes(searchTerm);
    const matchesSeries = (seriesValue === "all" || row[1] === seriesValue);
    const matchesForm = (formValue === "all" || catForms.includes(formValue));
    
    return matchesSearch && matchesSeries && matchesForm;
  });

  showCats([allMeeMeows[0], ...filteredData]);
}


// Updated to handle the specific form and button ID
function markOwned(name, form, btnId) {
  const btn = document.getElementById(btnId);
  if (!btn) return; // Safety check

  btn.innerText = "Saving...";
  btn.disabled = true;

  google.script.run
    .withSuccessHandler(function() {
      btn.innerText = form + " 🐾";
      btn.classList.add('owned-btn');
    })
    .withFailureHandler(function(err) {
      alert("Error saving: " + err.message);
      btn.innerText = "Retry?";
      btn.disabled = false;
    })
    .toggleOwned(name, form);
}

function showCats(data) {
  document.getElementById('loading-container').style.display = 'none';
  const container = document.getElementById('list');
  container.style.display = 'block';
  container.innerHTML = '';

  let sortedData = data.slice(1).sort((a, b) => (a[1] < b[1] ? -1 : 1));
  let currentSeries = "";
  let currentGrid = null;

  sortedData.forEach((row, i) => {
    const name = row[0];
    const series = row[1];
    const formsString = row[3] || "Mystery Form";
    const imgUrl = row[5];
    const ownedForms = row[6] || [];

    if (series !== currentSeries) {
      currentSeries = series;
      container.innerHTML += `<h2 class="series-header">${series}</h2>`;
      currentGrid = document.createElement('div');
      currentGrid.className = 'series-grid';
      container.appendChild(currentGrid);
    }

    const formsArray = formsString.split(',').map(f => f.trim());
    let trackingSection = "";

    // ONLY build buttons if canTrack is true
    if (canTrack) {
      let formButtonsHtml = "";
      formsArray.forEach((form, formIndex) => {
        const isOwned = ownedForms.includes(form);
        const uniqueId = `btn-${i}-${formIndex}`;
        const cleanName = name.replace(/['"]/g, "");
        const cleanForm = form.replace(/['"]/g, "");

        formButtonsHtml += `
          <button id="${uniqueId}" 
                  class="form-btn ${isOwned ? 'owned-btn' : ''}" 
                  onclick="markOwned('${cleanName}', '${cleanForm}', '${uniqueId}')" 
                  ${isOwned ? 'disabled' : ''}>
            ${form} ${isOwned ? '🐾' : '+'}
          </button>`;
      });
      trackingSection = formButtonsHtml;
    } else {
      // This is all Guests will see
      trackingSection = `<p style="font-size: 0.8em; color: #888; margin: 10px 0;">🐾 Login to track</p>`;
    }

    currentGrid.innerHTML += `
      <div class="card" id="card-${i}">
        <img src="${imgUrl}" class="meemeow-img" alt="${name}">
        <p><b>${name}</b></p>
        <div class="forms-container">
          ${trackingSection}
        </div>
      </div>`;
  });
}
      
      function filterCats() {
  // 1. Get the text from the search bar
  const input = document.getElementById('searchInput');
  const filter = input.value.toLowerCase();
  
  // 2. Get all the cat cards
  const cards = document.getElementsByClassName('card');

  // 3. Loop through them and hide/show based on the name
  for (let i = 0; i < cards.length; i++) {
    const name = cards[i].getElementsByTagName('b')[0].innerText.toLowerCase();
    
    if (name.indexOf(filter) > -1) {
      cards[i].style.display = "inline-block"; // Show
    } else {
      cards[i].style.display = "none"; // Hide
    }
  }
}

function openContactModal() {
  document.getElementById('contactModal').style.display = 'block';
}

function closeContactModal() {
  document.getElementById('contactModal').style.display = 'none';
}

function submitContactForm() {
  const email = document.getElementById('contactEmail').value;
  const desc = document.getElementById('contactDescription').value;
  const btn = document.getElementById('submitBtn');

  if (!email || !desc) {
    alert("Please fill out both fields! 🐾");
    return;
  }

  btn.innerText = "Sending...";
  btn.disabled = true;

  google.script.run
    .withSuccessHandler(function() {
      alert("Message sent! Thanks for helping make the tracker better. ✨");
      closeContactModal();
      // Reset form
      document.getElementById('contactEmail').value = '';
      document.getElementById('contactDescription').value = '';
      btn.innerText = "Send Message ✨";
      btn.disabled = false;
    })
    .sendContactEmail(email, desc);
}

// Close modal if user clicks outside of it
window.onclick = function(event) {
  const modal = document.getElementById('contactModal');
  if (event.target == modal) {
    closeContactModal();
  }
}
    </script>
