<script>
  let allMeeMeows = [];
  let isRegisterMode = false;
  let currentUser = localStorage.getItem('meemeow_user') || null;
  let currentUserName = localStorage.getItem('meemeow_name') || "Guest";

  // --- Start Up Logic ---
  window.addEventListener('DOMContentLoaded', () => {
    updateUI();
    google.script.run.withSuccessHandler(initializeStore).getMeeMeows(currentUser);
  });

  function initializeStore(data) {
    allMeeMeows = data;
    populateDropdowns(data);
    showCats(data);
  }

  function updateUI() {
    const authUI = document.getElementById('authUI');
    const title = document.getElementById('mainTitle');
    const banner = document.getElementById('loginBanner');

    // Safety check: only update if the elements exist
    if (authUI) {
      if (currentUser) {
        authUI.innerHTML = `
          <div class="user-pill">
            <span>🐾 ${currentUserName}</span>
            <button onclick="handleLogout()" class="logout-btn">Sign Out 🐾</button>
          </div>`;
      } else {
        authUI.innerHTML = `<button onclick="toggleAuthModal(true)" class="login-link">Login 🐾</button>`;
      }
    }

    if (title && currentUser) title.innerText = `✨ ${currentUserName}'s MeeMeow Collector's Guide ✨`;
    if (banner) banner.style.display = currentUser ? 'none' : 'block';
  }

  function toggleAuthModal(show) { document.getElementById('authModal').style.display = show ? 'block' : 'none'; }

  function switchAuthMode() {
    isRegisterMode = !isRegisterMode;
    document.getElementById('authTitle').innerText = isRegisterMode ? "Create Account 🐾" : "Login to Tracker 🐾";
    document.getElementById('authSubmitBtn').innerText = isRegisterMode ? "Register ✨" : "Login ✨";
    document.getElementById('authToggle').innerText = isRegisterMode ? "Have an account? Login" : "Need an account? Register!";
  }

  function handleAuthSubmit() {
    const email = document.getElementById('authEmail').value;
    const pwd = document.getElementById('authPassword').value;
    const btn = document.getElementById('authSubmitBtn');
    if (!email || !pwd) return alert("Please fill in both fields! 🐾");

    btn.disabled = true;
    btn.innerText = "Processing...";

    if (isRegisterMode) {
      google.script.run
        .withSuccessHandler(msg => { alert(msg); switchAuthMode(); btn.disabled = false; btn.innerText = "Login ✨"; })
        .withFailureHandler(err => { alert(err); btn.disabled = false; btn.innerText = "Register ✨"; })
        .registerUser(email, pwd);
    } else {
      google.script.run
        .withSuccessHandler(user => {
          localStorage.setItem('meemeow_user', user.email);
          localStorage.setItem('meemeow_name', user.name);
          location.reload();
        })
        .withFailureHandler(err => { alert(err); btn.disabled = false; btn.innerText = "Login ✨"; })
        .loginUser(email, pwd);
    }
  }

  function handleLogout() {
    localStorage.removeItem('meemeow_user');
    localStorage.removeItem('meemeow_name');
    location.reload();
  }

  function markOwned(name, form, btnId) {
    if (!currentUser) return alert("Please login first! 🐾");
    const btn = document.getElementById(btnId);
    btn.innerText = "Saving...";
    btn.disabled = true;

    google.script.run
      .withSuccessHandler(() => { btn.innerText = form + " 🐾"; btn.classList.add('owned-btn'); })
      .withFailureHandler(err => { alert(err); btn.disabled = false; })
      .toggleOwned(currentUser, name, form);
  }

  function populateDropdowns(data) {
    const seriesDD = document.getElementById('seriesFilter');
    const formDD = document.getElementById('formFilter');
    const series = [...new Set(data.slice(1).map(r => r[1]))].sort();
    const forms = [...new Set(data.slice(1).map(r => r[3] ? r[3].split(',') : []).flat().map(f => f.trim()))].sort();
    series.forEach(s => { if(s){ let o = document.createElement('option'); o.value=o.innerHTML=s; seriesDD.appendChild(o); }});
    forms.forEach(f => { if(f){ let o = document.createElement('option'); o.value=o.innerHTML=f; formDD.appendChild(o); }});
  }

  function applyFilters() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const sVal = document.getElementById('seriesFilter').value;
    const fVal = document.getElementById('formFilter').value;
    const filtered = allMeeMeows.filter((r, i) => {
      if (i === 0) return false;
      const cats = r[3] ? r[3].split(',').map(f => f.trim()) : [];
      return r[0].toLowerCase().includes(search) && (sVal === "all" || r[1] === sVal) && (fVal === "all" || cats.includes(fVal));
    });
    showCats([allMeeMeows[0], ...filtered]);
  }

  function showCats(data) {
    const loading = document.getElementById('loading-container');
    if (loading) loading.style.display = 'none';
    const container = document.getElementById('list');
    if (!container) return;
    container.style.display = 'block';
    container.innerHTML = '';

    let sorted = data.slice(1).sort((a, b) => a[1] < b[1] ? -1 : 1);
    let curSeries = ""; let curGrid = null;

    sorted.forEach((row, i) => {
      if (row[1] !== curSeries) {
        curSeries = row[1];
        container.innerHTML += `<h2 class="series-header">${curSeries}</h2>`;
        curGrid = document.createElement('div'); curGrid.className = 'series-grid'; container.appendChild(curGrid);
      }
      const forms = (row[3] || "").split(',').map(f => f.trim());
      let tracking = currentUser ? "" : `<p style="font-size:0.8em;color:#888;">🐾 Login to track</p>`;
      if(currentUser) {
        forms.forEach((f, fi) => {
          const owned = (row[6] || []).includes(f);
          const uid = `btn-${i}-${fi}`;
          tracking += `<button id="${uid}" class="form-btn ${owned?'owned-btn':''}" onclick="markOwned('${row[0].replace(/'/g,"\\'")}', '${f}', '${uid}')" ${owned?'disabled':''}>${f} ${owned?'🐾':'+'}</button>`;
        });
      }
      curGrid.innerHTML += `<div class="card"><img src="${row[5]}" class="meemeow-img"><p><b>${row[0]}</b></p><div class="forms-container">${tracking}</div></div>`;
    });
  }

  function openContactModal() { document.getElementById('contactModal').style.display = 'block'; }
  function closeContactModal() { document.getElementById('contactModal').style.display = 'none'; }
  function submitContactForm() {
    const e = document.getElementById('contactEmail').value;
    const d = document.getElementById('contactDescription').value;
    if(!e || !d) return alert("Fill out all fields! 🐾");
    google.script.run.withSuccessHandler(() => { alert("Message sent! ✨"); closeContactModal(); }).sendContactEmail(e, d);
  }
