<style>
  body { background-color: #FFC0CB; font-family: 'Comic Sans MS', cursive; }
  .card { border: 2px solid #B0E0E6; border-radius: 15px; margin: 10px; padding: 10px; background: white; display: inline-block; width: 200px; }

  /* --- Coco's Cute Loading Star --- */

:root {
  --coco-pink: #FFC0CB;
  --coco-blue: #B0E0E6;
}

/* Remove display:flex from #list, we'll use it on the grids instead */
#list {
  display: block; 
  padding: 10px;
}

/* This container holds one series of 8 cats */
.series-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center; /* Centers the cards when they wrap */
  gap: 12px;
  margin-bottom: 30px;
  width: 100%;
}

.card {
  border: 2px solid #B0E0E6;
  border-radius: 15px;
  background: white;
  padding: 10px;
  box-sizing: border-box;
  text-align: center;
  
  /* The "Secret Sauce" for Mobile */
  flex: 1 1 150px;     /* Grows, shrinks, but tries to stay 150px wide */
  max-width: 180px;    /* Prevents them from getting TOO huge on big screens */
  min-width: 130px;    /* The absolute limit before it jumps to the next row */
  
  display: flex;
  flex-direction: column;
  justify-content: space-between; /* Keeps buttons aligned even with long names */
}

#loading-container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 50vh; /* Centers vertically */
}

.coco-star {
  width: 50px;
  height: 50px;
  background: var(--coco-pink);
  clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
  animation: spin-pulse 1.5s infinite ease-in-out;
  border: 4px solid var(--coco-blue); /* Outline color */
}

/* The Magic Animation */
@keyframes spin-pulse {
  0% { transform: rotate(0deg) scale(1); background: var(--coco-pink); }
  50% { transform: rotate(180deg) scale(1.3); background: var(--coco-blue); } /* Swaps color at peak */
  100% { transform: rotate(360deg) scale(1); background: var(--coco-pink); }
}

.card.owned {
  border: 3px solid #FFC0CB; /* Pink border */
  box-shadow: 0 0 15px rgba(255, 192, 203, 0.8); /* Whimsical glow */
  background-color: #fff9fb;
}

.card.owned button {
  background-color: #B0E0E6; /* Changes button to blue */
  cursor: default;
}

.search-container {

}

#searchInput {
