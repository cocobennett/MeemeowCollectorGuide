<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <?!= include('Stylesheet'); ?>
  <meta charset="UTF-8">
  <meta name="referrer" content="no-referrer-when-downgrade">
</head>
<body>
  <div class="auth-container" id="authUI"></div>

  <h1 id="mainTitle">✨ MeeMeow Collector's Guide ✨</h1>

  <div id="loginBanner" class="login-banner" style="display:none;">
    🐾 Want to track your collection? <a href="#" onclick="toggleAuthModal(true)">Login or Register</a> to save your MeeMeows!
  </div>

  <div class="controls">
    <input type="text" id="searchInput" onkeyup="applyFilters()" placeholder="Search cats... 🐾">
    <select id="seriesFilter" onchange="applyFilters()"><option value="all">All Series ✨</option></select>
    <select id="formFilter" onchange="applyFilters()"><option value="all">All Forms ✨</option></select>
    <button onclick="openContactModal()" class="contact-btn">Contact Me 💌</button>
  </div>

  <div id="loading-container">
    <div>Loading cats...</div>
    <div class="coco-star"></div>
  </div>

  <div id="list" style="display: none;"></div>

  <div id="authModal" class="modal">
    <div class="modal-content">
      <span class="close-btn" onclick="toggleAuthModal(false)">&times;</span>
      <h3 id="authTitle">Login to Tracker 🐾</h3>
      <div class="contact-form">
        <input type="email" id="authEmail" placeholder="Email">
        <input type="password" id="authPassword" placeholder="Password">
        <button onclick="handleAuthSubmit(event)" id="authSubmitBtn" class="contact-btn">Login ✨</button>
        <p style="font-size: 0.8em; margin-top:10px;">
          <a href="javascript:void(0)" id="authToggle" onclick="switchAuthMode()">Need an account? Register here!</a>
        </p>
      </div>
    </div>
  </div>

  <footer class="coco-footer">
    <div class="footer-content">
      <p>🐾 <b>MeeMeow Links</b> 🐾</p>
      <div class="footer-links">
        <a href="https://www.aphmeow.com/meemeows" target="_blank">Official Aphmau Website</a>
        <a href="https://www.youtube.com/@CocosCreations1130" target="_blank">Watch Coco's Creations!</a>
      </div>
      <p class="footer-credit">Created with ✨ for Coco's Creations</p>
    </div>
  </footer>

  <div id="contactModal" class="modal">
    <div class="modal-content">
      <span class="close-btn" onclick="closeContactModal()">&times;</span>
      <h3>Contact Coco 🐾</h3>
      <div class="contact-form">
        <input type="email" id="contactEmail" placeholder="your@email.com">
        <textarea id="contactDescription" rows="4"></textarea>
        <button onclick="submitContactForm()" id="submitBtn">Send Message ✨</button>
      </div>
    </div>
  </div>

  <?!= include('JavaScript'); ?>
</body>
</html>
