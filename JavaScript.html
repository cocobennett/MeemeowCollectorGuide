<script>
let allMeeMeows = []; // We'll store the data here so we can filter it easily

google.script.run.withSuccessHandler(initializeStore).getMeeMeows();

function initializeStore(data) {
  allMeeMeows = data;
  populateDropdown(data);
  showCats(data);
}

// Automatically adds series names to your dropdown from the Sheet
function populateDropdown(data) {
  const dropdown = document.getElementById('seriesFilter');
  const seriesList = [...new Set(data.slice(1).map(row => row[1]))]; // Get unique series from Column B
  
  seriesList.sort().forEach(series => {
    if (series) {
      let opt = document.createElement('option');
      opt.value = series;
      opt.innerHTML = series;
      dropdown.appendChild(opt);
    }
  });
}

function showCats(data) {
  document.getElementById('loading-container').style.display = 'none';
  const container = document.getElementById('list');
  container.style.display = 'block';
  container.innerHTML = '';

  let sortedData = data.slice(1).sort((a, b) => (a[1] < b[1] ? -1 : 1));
  let currentSeries = "";

  sortedData.forEach((row, i) => {
    const name = row[0];
    const series = row[1];
    const formsString = row[3] || "Mystery Form";
    const imgUrl = row[5];
    const ownedForms = row[6]; // This is now an array of forms the user owns

    if (series !== currentSeries) {
      currentSeries = series;
      container.innerHTML += `<h2 class="series-header">${series}</h2>`;
    }

    // Split the forms string into an array (e.g., "Plush, Vinyl" -> ["Plush", "Vinyl"])
    const formsArray = formsString.split(',').map(f => f.trim());

    // Generate HTML for each form button
    let formButtonsHtml = "";
    formsArray.forEach((form, formIndex) => {
      const isOwned = ownedForms.includes(form);
      const uniqueId = `btn-${i}-${formIndex}`;
      
      // We'll clean the strings to remove any problematic single/double quotes
      const cleanName = name.replace(/['"]/g, "");
      const cleanForm = form.replace(/['"]/g, "");

      formButtonsHtml += `
        <button id="${uniqueId}" 
                class="form-btn ${isOwned ? 'owned-btn' : ''}" 
                onclick="markOwned('${cleanName}', '${cleanForm}', '${uniqueId}')" 
                ${isOwned ? 'disabled' : ''}>
          ${form} ${isOwned ? '🐾' : '+'}
        </button>`;
    });

    container.innerHTML += `
      <div class="card" id="card-${i}">
        <img src="${imgUrl}" class="meemeow-img" alt="${name}">
        <p><b>${name}</b></p>
        <div class="forms-container">
          ${formButtonsHtml}
        </div>
      </div>`;
  });
}

// Updated to handle the specific form and button ID
function markOwned(name, form, btnId) {
  const btn = document.getElementById(btnId);
  if (!btn) return; // Safety check

  btn.innerText = "Saving...";
  btn.disabled = true;

  google.script.run
    .withSuccessHandler(function() {
      btn.innerText = form + " 🐾";
      btn.classList.add('owned-btn');
    })
    .withFailureHandler(function(err) {
      alert("Error saving: " + err.message);
      btn.innerText = "Retry?";
      btn.disabled = false;
    })
    .toggleOwned(name, form);
}

// Update applyFilters to work with headers
function applyFilters() {
  const searchTerm = document.getElementById('searchInput').value.toLowerCase();
  const seriesValue = document.getElementById('seriesFilter').value;

  // Filter the original global array 'allMeeMeows'
  const filteredData = allMeeMeows.filter((row, index) => {
    if (index === 0) return false; // Skip original header
    const matchesSearch = row[0].toLowerCase().includes(searchTerm);
    const matchesSeries = (seriesValue === "all" || row[1] === seriesValue);
    return matchesSearch && matchesSeries;
  });

  // Re-run showCats with ONLY the filtered data (this handles headers automatically!)
  // We add back a dummy header row so the loop logic stays the same
  showCats([allMeeMeows[0], ...filteredData]);
}

      
      function filterCats() {
  // 1. Get the text from the search bar
  const input = document.getElementById('searchInput');
  const filter = input.value.toLowerCase();
  
  // 2. Get all the cat cards
  const cards = document.getElementsByClassName('card');

  // 3. Loop through them and hide/show based on the name
  for (let i = 0; i < cards.length; i++) {
    const name = cards[i].getElementsByTagName('b')[0].innerText.toLowerCase();
    
    if (name.indexOf(filter) > -1) {
      cards[i].style.display = "inline-block"; // Show
    } else {
      cards[i].style.display = "none"; // Hide
    }
  }
}
    </script>
